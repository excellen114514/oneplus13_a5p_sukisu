name: Cleanup

on:
  #schedule:
    #- cron: '0 0 * * *' 
  workflow_dispatch:    

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Authenticate gh
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete all releases and tags
        run: |
          # 删除所有 Release 及其关联的 Tag
          echo "Fetching all releases..."
          gh api repos/${{ github.repository }}/releases --paginate \
          | jq -c '.[] | {id: .id, tag_name: .tag_name}' \
          | while read release; do
              id=$(echo $release | jq -r '.id')
              tag=$(echo $release | jq -r '.tag_name')
              echo "Deleting release $id (tag: $tag)..."
              gh api --method DELETE repos/${{ github.repository }}/releases/$id
              echo "Deleting tag $tag (if exists)..."
              gh api --method DELETE repos/${{ github.repository }}/git/refs/tags/$tag || true
            done

          # 删除所有剩余的 Tag（那些没有对应 Release 的 Tag）
          echo "Fetching all tags to clean up any leftovers..."
          gh api repos/${{ github.repository }}/git/refs/tags --paginate \
          | jq -r '.[].ref' \
          | while read ref; do
              tag_name=$(echo $ref | sed 's#refs/tags/##')
              echo "Deleting tag $tag_name..."
              gh api --method DELETE repos/${{ github.repository }}/git/refs/tags/$tag_name || true
            done
